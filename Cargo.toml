[workspace]
members = [
    "crates/demiurg-core",
]
resolver = "3"

[workspace.package]
version = "0.0.1"
edition = "2024"
license = "MIT OR Apache-2.0"
repository = "https://github.com/NCrashed/demiurg"
authors = ["Anton Gushcha <ncrashed@gmail.com>"]
# Edition 2024 requires a 1.85+ toolchain; we build on the nightly
# pinned in rust-toolchain.toml (shared with roxlap/monada for the
# wasm-threads path). No nightly-only feature is used off wasm32.
rust-version = "1.85"
readme = "README.md"

[workspace.dependencies]
# demiurg depends on roxlap ONLY (see DESIGN.md §1). Path deps to the
# sibling checkout during local dev; `version` is what a future
# `cargo publish` would record. roxlap-formats is the sole dependency
# for M0 (kv6 read/write + surface extraction via `Kv6::from_fn`);
# roxlap-render/scene/core land at M1, roxlap-voxvideo at M5.
roxlap-formats = { path = "../roxlap/crates/roxlap-formats", version = "0.7.0" }

[workspace.lints.rust]
unsafe_op_in_unsafe_fn = "warn"

[workspace.lints.clippy]
pedantic = { level = "warn", priority = -1 }
# Module-name redundancy is fine for small crates that may grow
# (matches roxlap / monada).
module_name_repetitions = "allow"
