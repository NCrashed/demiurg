[workspace]
members = [
    "crates/demiurg-core",
    "crates/demiurg-i18n",
    "crates/demiurg-view",
    "crates/demiurg-app",
]
resolver = "3"

[workspace.package]
version = "0.0.1"
edition = "2024"
license = "MIT OR Apache-2.0"
repository = "https://github.com/NCrashed/demiurg"
authors = ["Anton Gushcha <ncrashed@gmail.com>"]
# Edition 2024 requires a 1.85+ toolchain; we build on the nightly
# pinned in rust-toolchain.toml (shared with roxlap/monada for the
# wasm-threads path). No nightly-only feature is used off wasm32.
rust-version = "1.85"
readme = "README.md"

[workspace.dependencies]
# Internal crates, by path during local dev.
demiurg-core = { path = "crates/demiurg-core", version = "0.0.1" }
demiurg-i18n = { path = "crates/demiurg-i18n", version = "0.0.1" }
demiurg-view = { path = "crates/demiurg-view", version = "0.0.1" }

# demiurg depends on roxlap ONLY (see DESIGN.md §1). Pinned to the
# PUBLISHED crates.io release (not the local ../roxlap checkout, which
# is mid-development on 1.0.0 and not ready). All four come from the
# same source so `Kv6`/`Sprite` types stay compatible; bump them
# together when a new roxlap is published. (mirrors monada's stance.)
#
# roxlap-formats: kv6 read/write + surface extraction (`Kv6::from_fn`).
# roxlap-core:    Camera, OpticastSettings, SpriteLighting.
# roxlap-scene:   Scene graph the renderer composites.
# roxlap-render:  unified CPU/GPU facade (SceneRenderer, SpriteSet).
# roxlap-voxvideo lands at M5.
roxlap-formats = "0.8.0"
roxlap-core = "0.8.0"
roxlap-scene = "0.8.0"
roxlap-render = "0.8.0"

# Render-side world math (f64 orbit camera). Mirrors roxlap's pin so
# the workspaces share one glam.
glam = { version = "0.30", default-features = false, features = ["std"] }
# Native windowing + input for demiurg-app (M1). Matches monada-host.
winit = "0.30"
# `.demiurg` project codec (M2): serde schema + postcard wire format.
# postcard is no_std-friendly (alloc only) so it also rides to wasm (M3).
serde = { version = "1", features = ["derive"] }
postcard = { version = "1", default-features = false, features = ["alloc"] }
# egui input/output bridge for winit (M2 UI); egui itself comes via
# `roxlap_render::egui` (hud feature) so the versions can't drift.
egui-winit = { version = "0.29", default-features = false }
# Native file dialogs (open/save .kv6 and .demiurg). Web uses a
# different path (M3), so this stays a native-only dep on demiurg-app.
rfd = "0.15"

[workspace.lints.rust]
unsafe_op_in_unsafe_fn = "warn"

[workspace.lints.clippy]
pedantic = { level = "warn", priority = -1 }
# Module-name redundancy is fine for small crates that may grow
# (matches roxlap / monada).
module_name_repetitions = "allow"
